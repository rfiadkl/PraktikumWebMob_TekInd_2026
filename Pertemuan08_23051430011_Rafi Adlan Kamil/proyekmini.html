<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyek Mini - Laporan Insiden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Laporan Insiden</h2>
        <button id="btnMuatInsiden" class="btn btn-danger">Muat 10 Insiden Terbaru</button>
    </div>

    <div id="loading" class="text-center d-none my-4">
        <div class="spinner-border text-danger" role="status"></div>
        <p>Sedang mengambil data insiden...</p>
    </div>

    <div class="row" id="containerInsiden">
        <div class="col-12 text-center text-muted">
            <p>Klik tombol merah untuk melihat laporan.</p>
        </div>
    </div>

    <script src="proyekmini.js"></script>
</body>
</html>
